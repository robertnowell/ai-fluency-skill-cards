<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Headline Options — Round 3</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0e0d0b; color: #e8d8b0; font-family: 'Outfit', sans-serif; padding: 2rem; }
  h1 { font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; margin-bottom: 0.5rem; color: rgba(232,216,176,0.6); text-align: center; }
  .note { text-align: center; font-size: 0.75rem; color: rgba(232,216,176,0.3); margin-bottom: 2rem; }
  .archetype-block { margin-bottom: 2.5rem; border: 1px solid rgba(160,128,64,0.15); border-radius: 12px; padding: 1.5rem; }
  .archetype-name { font-family: 'Cormorant Garamond', serif; font-size: 1.3rem; font-weight: 700; margin-bottom: 0.8rem; }
  .headline { font-family: 'Cormorant Garamond', serif; font-weight: 600; font-size: 1.15rem; color: rgba(232,216,176,0.85); line-height: 1.4; padding: 0.6rem 0; }
</style>
</head>
<body>

<h1>Round 3 — Verbs need objects</h1>
<div class="note">Every verb has a concrete object. No ambiguity about what you do.</div>

<script>
const USER = 'Rob';

const archetypes = [
  { key: 'polymath', name: 'The Polymath', color: '#a08040',
    h: `${USER}, you shape Claude's output and question its reasoning \u2014 the rarest combination.` },
  { key: 'conductor', name: 'The Conductor', color: '#8b3a62',
    h: `${USER}, you set the goal AND describe the output \u2014 Claude gets it right the first time.` },
  { key: 'architect', name: 'The Architect', color: '#5a6a7a',
    h: `${USER}, you plan the approach then question every result.` },
  { key: 'forgemaster', name: 'The Forgemaster', color: '#b8860b',
    h: `${USER}, you specify format, tone, and examples that most users leave to chance.` },
  { key: 'illuminator', name: 'The Illuminator', color: '#3d8a5a',
    h: `${USER}, you question Claude's reasoning when most users accept the first answer.` },
  { key: 'compass', name: 'The Compass', color: '#4a7ba3',
    h: `${USER}, you define the goal and approach before the first word is written.` },
  { key: 'catalyst', name: 'The Catalyst', color: '#d4584a',
    h: `${USER}, you iterate on results faster than most \u2014 momentum is your engine.` },
];

for (const a of archetypes) {
  document.write(`
    <div class="archetype-block" style="border-color: ${a.color}40">
      <div class="archetype-name" style="color: ${a.color}">${a.name}</div>
      <div class="headline">${a.h}</div>
    </div>
  `);
}
</script>

</body>
</html>
