<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skill Tree — Radar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Outfit', sans-serif;
      font-weight: 300;
      background: #0a0908;
      color: #e8e4df;
      min-height: 100vh;
    }

    .page {
      max-width: 560px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem 4rem;
    }

    .mark {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.7rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(160,128,64,0.4);
      text-align: center;
      margin-bottom: 2rem;
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    /* ══════════════════════════════════════════
       TAROT CARD
       ══════════════════════════════════════════ */

    .card {
      --ap: #9e9589; --aa: #d4cec6;
      max-width: 380px;
      margin: 0 auto 2rem;
      aspect-ratio: 7 / 12;
      border-radius: 12px;
      border: 3px solid #2a2520;
      overflow: hidden;
      position: relative;
      background: #0e0d0b;
      opacity: 0;
      transform: translateY(12px);
      animation: fadeUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) 0.1s forwards;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6);
    }

    .card[data-archetype="catalyst"]    { --ap: #d4584a; --aa: #e8a090; }
    .card[data-archetype="compass"]     { --ap: #4a7ba3; --aa: #a3c4db; }
    .card[data-archetype="forgemaster"] { --ap: #b8860b; --aa: #e8d4a8; }
    .card[data-archetype="illuminator"] { --ap: #3d8a5a; --aa: #a8d4b8; }
    .card[data-archetype="architect"]   { --ap: #6a8094; --aa: #b0c0d0; }
    .card[data-archetype="conductor"]   { --ap: #8b3a62; --aa: #d4a0b8; }
    .card[data-archetype="polymath"]    { --ap: #a08040; --aa: #e8d8b0; }

    .card::before {
      content: '';
      position: absolute; inset: 6px; z-index: 1;
      border: 1px solid rgba(160,128,64,0.25);
      border-radius: 8px;
      pointer-events: none;
    }
    .card::after {
      content: '';
      position: absolute; inset: 10px; z-index: 1;
      border: 1px solid rgba(160,128,64,0.12);
      border-radius: 6px;
      pointer-events: none;
    }

    .corner {
      position: absolute; width: 20px; height: 20px; z-index: 2;
      border-color: rgba(160,128,64,0.3); border-style: solid; border-width: 0;
    }
    .corner.tl { top: 12px; left: 12px; border-top-width: 1px; border-left-width: 1px; }
    .corner.tr { top: 12px; right: 12px; border-top-width: 1px; border-right-width: 1px; }
    .corner.bl { bottom: 12px; left: 12px; border-bottom-width: 1px; border-left-width: 1px; }
    .corner.br { bottom: 12px; right: 12px; border-bottom-width: 1px; border-right-width: 1px; }

    .card-art { position: absolute; inset: 0; z-index: 0; }
    .card-art img {
      width: 100%; height: 100%; object-fit: cover; display: block;
      mask-image: linear-gradient(to bottom, transparent 0%, black 12%, black 65%, transparent 100%);
      -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 12%, black 65%, transparent 100%);
    }

    .card-top {
      position: relative; z-index: 2; text-align: center;
      padding: 1.2rem 1.5rem 0.5rem;
      background: linear-gradient(180deg, rgba(14,13,11,0.9) 0%, transparent 100%);
    }
    .card-numeral {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.6rem; color: rgba(160,128,64,0.5); letter-spacing: 0.4em;
    }
    .card-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.8rem; font-weight: 600; color: #e8d8b0;
      letter-spacing: 0.04em; text-shadow: 0 2px 12px rgba(0,0,0,0.8); line-height: 1.1;
    }

    .card-bottom {
      position: absolute; bottom: 0; left: 0; right: 0; z-index: 2;
      text-align: center; padding: 3rem 1.5rem 1.2rem;
      background: linear-gradient(to top, rgba(14,13,11,0.95) 0%, rgba(14,13,11,0.75) 40%, transparent 100%);
    }
    .card-tagline {
      font-family: 'Cormorant Garamond', serif; font-style: italic;
      font-size: 0.9rem; color: rgba(200,190,175,0.85); line-height: 1.4; margin-bottom: 0.6rem;
    }
    .card-divider { width: 40px; height: 1px; background: rgba(160,128,64,0.3); margin: 0.5rem auto; }
    .card-axes { display: flex; justify-content: center; gap: 1.5rem; margin-bottom: 0.5rem; }
    .card-ax {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.7rem; color: rgba(160,128,64,0.6); letter-spacing: 0.05em;
    }
    .card-power {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.65rem; color: rgba(232,216,176,0.45); font-style: italic; line-height: 1.4;
    }

    /* ══════════════════════════════════════════
       RADAR (4-axis diamond)
       ══════════════════════════════════════════ */

    .radar-section {
      background: #1a1918;
      border: 1px solid #2a2826;
      border-radius: 1rem;
      overflow: visible;
      margin-bottom: 1.5rem;
      opacity: 0;
      transform: translateY(12px);
      animation: fadeUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) 0.3s forwards;
    }

    .radar-header {
      padding: 1.5rem 2rem 0.5rem;
      border-bottom: 1px solid #2a2826;
    }
    .radar-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.3rem; font-weight: 600; color: #e8e4df;
    }
    .radar-sub { font-size: 0.7rem; color: #4a4540; margin-top: 0.25rem; }

    .radar-body {
      padding: 1.5rem 1rem 0.5rem;
      display: flex; flex-direction: column; align-items: center;
      position: relative;
    }

    .radar-svg {
      width: 100%;
      max-width: 420px;
      aspect-ratio: 1;
    }

    .sector-hit {
      fill: transparent;
      cursor: pointer;
      transition: fill 0.15s;
    }
    .sector-hit:hover {
      fill: rgba(160,128,64,0.04);
    }
    .sector-hit.selected {
      fill: rgba(160,128,64,0.06);
    }

    /* ── Gateway bar (iteration) ── */
    .gateway {
      padding: 0.8rem 2rem;
      border-top: 1px solid #2a2826;
      display: flex; align-items: center; gap: 0.75rem;
      width: 100%;
    }
    .gateway-label { font-size: 0.7rem; color: #6b6560; font-weight: 500; white-space: nowrap; }
    .gateway-bar { flex: 1; height: 4px; background: #2a2826; border-radius: 2px; overflow: hidden; }
    .gateway-fill { height: 100%; background: #4a4540; border-radius: 2px; width: 0%; transition: width 1s cubic-bezier(0.22,1,0.36,1); }
    .gateway-pct { font-size: 0.7rem; color: #4a4540; font-variant-numeric: tabular-nums; }

    /* ── Drilldown panel ── */
    .drilldown {
      width: 100%;
      padding: 0 2rem;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s cubic-bezier(0.22,1,0.36,1), opacity 0.3s, padding 0.3s;
      opacity: 0;
    }
    .drilldown.visible {
      max-height: 300px;
      opacity: 1;
      padding: 1rem 2rem 1.25rem;
    }
    .drilldown.preview {
      opacity: 0.7;
    }

    .drilldown-header {
      display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.6rem;
    }
    .drilldown-dot { width: 8px; height: 8px; border-radius: 50%; }
    .drilldown-name { font-weight: 500; font-size: 0.8rem; color: #e8e4df; }
    .drilldown-desc { font-size: 0.6rem; color: #4a4540; margin-left: 0.2rem; }
    .drilldown-locked {
      margin-left: auto;
      font-size: 0.55rem;
      color: rgba(160,128,64,0.4);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .behavior-row { display: flex; align-items: center; gap: 0.6rem; margin-bottom: 0.5rem; }
    .behavior-name { width: 130px; font-size: 0.7rem; color: #6b6560; text-align: right; flex-shrink: 0; }
    .bar-track { flex: 1; height: 5px; background: #2a2826; border-radius: 3px; overflow: hidden; position: relative; }
    .bar-fill { height: 100%; border-radius: 3px; width: 0%; transition: width 0.6s cubic-bezier(0.22,1,0.36,1); }
    .bar-baseline { position: absolute; top: -2px; height: 9px; width: 2px; background: #e8e4df; opacity: 0.12; border-radius: 1px; }
    .behavior-pct { width: 40px; font-size: 0.65rem; color: #6b6560; font-variant-numeric: tabular-nums; }
    .behavior-cmp { width: 16px; font-size: 0.6rem; text-align: center; }
    .above { color: #5a9e6f; } .below { color: #c4836e; } .at { color: #4a4540; }

    .diligence-note {
      font-size: 0.7rem; color: #4a4540; line-height: 1.5; font-style: italic;
    }

    /* ── Growth Quest ── */
    .quest {
      background: #1a1918;
      border: 1px solid #2a2826;
      border-radius: 1rem;
      padding: 1.5rem 2rem;
      margin-bottom: 1.5rem;
      opacity: 0;
      transform: translateY(12px);
      animation: fadeUp 0.6s cubic-bezier(0.22,1,0.36,1) 0.5s forwards;
    }
    .quest-label {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.6rem; font-weight: 600; letter-spacing: 0.2em; text-transform: uppercase;
      color: rgba(160,128,64,0.6); margin-bottom: 0.5rem;
    }
    .quest-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem; font-weight: 600; color: #e8e4df; margin-bottom: 0.4rem;
    }
    .quest-text { font-size: 0.8rem; color: #8a8580; line-height: 1.5; }
    .quest-edge {
      margin-top: 0.75rem; padding-top: 0.75rem; border-top: 1px solid #2a2826;
      font-size: 0.7rem; color: #6b6560;
    }
    .quest-edge strong { color: #8a8580; font-weight: 500; }

    .footer {
      text-align: center; margin-top: 1rem;
      opacity: 0; animation: fadeUp 0.6s cubic-bezier(0.22,1,0.36,1) 0.7s forwards;
    }
    .footer-text { font-size: 0.6rem; color: #3a3835; }
    .footer-text a { color: #4a4540; text-decoration: none; }
    .footer-text a:hover { color: #6b6560; }

    @media (max-width: 480px) {
      .page { padding: 1.5rem 1rem 3rem; }
      .card { max-width: 100%; }
      .card-name { font-size: 1.5rem; }
      .drilldown.visible { padding: 1rem 1.5rem 1.25rem; }
      .behavior-name { width: 100px; font-size: 0.65rem; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="mark">Skill Tree &middot; AI Fluency</div>

    <div class="card" id="character-card"></div>

    <div class="radar-section" id="radar-section">
      <div class="radar-header">
        <div class="radar-title">Skill Radar</div>
        <div class="radar-sub">4 dimensions &middot; click to explore &middot; dashed = population avg</div>
      </div>
      <div class="radar-body">
        <svg class="radar-svg" viewBox="0 0 420 420" id="radar-svg"></svg>
      </div>
      <div class="drilldown" id="drilldown"></div>
      <div class="gateway" id="gateway"></div>
    </div>

    <div class="quest" id="growth-quest"></div>

    <div class="footer">
      <div class="footer-text">
        <a href="https://www.anthropic.com/research/AI-fluency-index">Anthropic AI Fluency Index</a>
        &middot; <a href="https://aifluencyframework.org/">Dakan &amp; Feller</a>
        &middot; <a href="https://github.com/robertnowell">Robert Nowell</a>
      </div>
    </div>
  </div>

  <script>
    const PROFILE = __PROFILE_DATA__;
    const ARCHETYPES = __ARCHETYPES_DATA__;
    const NUMERALS = { catalyst:'I', compass:'II', forgemaster:'III', conductor:'IV', illuminator:'V', architect:'VI', polymath:'VII' };

    // 4 axes: the 4 D's from the AI Fluency Framework
    // 4D AI Fluency Framework: Description, Discernment, Delegation, Diligence
    const AXES_ORDER = ['Description', 'Discernment', 'Diligence', 'Delegation'];
    const AXIS_ANGLES = [0, 90, 180, 270]; // diamond: top, right, bottom, left
    const AXIS_COLORS = {
      Description: '#cca67b',
      Discernment: '#7bcc96',
      Diligence: '#9b8ec4',
      Delegation: '#7ba3cc'
    };
    const AXIS_DESCS = {
      Description: 'How you shape output',
      Discernment: 'How you assess reasoning',
      Diligence: 'Ethics, transparency & safety',
      Delegation: 'How you set up collaboration'
    };
    const AXIS_4D = {
      Description: 'Description',
      Discernment: 'Discernment',
      Diligence: 'Diligence',
      Delegation: 'Delegation'
    };

    // ── Math ─────────────────────────────────────────────────────────
    const CX = 210, CY = 210, R = 140;
    const N = 4;
    const MIN_DISPLAY = 0.08;

    function polarToCartesian(cx, cy, radius, angleDeg) {
      const rad = (angleDeg - 90) * Math.PI / 180;
      return { x: cx + radius * Math.cos(rad), y: cy + radius * Math.sin(rad) };
    }

    function quadPoints(values) {
      return values.map((v, i) => {
        const p = polarToCartesian(CX, CY, R * Math.max(v, MIN_DISPLAY), AXIS_ANGLES[i]);
        return `${p.x},${p.y}`;
      }).join(' ');
    }

    function sectorPath(startAngle, endAngle) {
      const r = R + 15;
      const p1 = polarToCartesian(CX, CY, r, startAngle);
      const p2 = polarToCartesian(CX, CY, r, endAngle);
      return `M${CX},${CY} L${p1.x},${p1.y} A${r},${r} 0 0 1 ${p2.x},${p2.y} Z`;
    }

    // ── State ────────────────────────────────────────────────────────
    let selectedAxis = null;  // click-locked axis
    let hoveredAxis = null;   // hover-previewed axis

    // ── Render card ──────────────────────────────────────────────────
    function renderCard(p) {
      const a = p.archetype || {};
      const el = document.getElementById('character-card');
      const key = a.key || 'catalyst';
      el.setAttribute('data-archetype', key);

      const url = a.hero_art?.url || '';
      const pos = a.hero_art?.position || 'center center';
      const descPct = Math.round((a.axis_scores?.description || 0) * 100);
      const discPct = Math.round((a.axis_scores?.discernment || 0) * 100);
      const delegPct = Math.round((a.axis_scores?.delegation || 0) * 100);

      el.innerHTML = `
        <div class="corner tl"></div><div class="corner tr"></div>
        <div class="corner bl"></div><div class="corner br"></div>
        <div class="card-art">${url ? `<img src="${url}" alt="" style="object-position:${pos}">` : ''}</div>
        <div class="card-top">
          <div class="card-numeral">${NUMERALS[key] || ''}</div>
          <div class="card-name">${a.name || 'Unknown'}</div>
        </div>
        <div class="card-bottom">
          <div class="card-tagline">${a.tagline || ''}</div>
          <div class="card-divider"></div>
          <div class="card-axes">
            <div class="card-ax">Desc ${descPct}%</div>
            <div class="card-ax">Disc ${discPct}%</div>
            <div class="card-ax">Deleg ${delegPct}%</div>
          </div>
          <div class="card-divider"></div>
          <div class="card-power">${a.superpower || ''}</div>
        </div>
      `;
    }

    // ── Render radar ─────────────────────────────────────────────────
    function renderRadar(p) {
      const svg = document.getElementById('radar-svg');
      const archetypeColor = p.archetype?.color || '#a08040';

      // Scores: 3 real axes + Diligence at 0 (unmeasurable)
      const scores = AXES_ORDER.map(name => {
        if (name === 'Diligence') return 0;
        return p.branches?.[name]?.score || 0;
      });
      const baselines = AXES_ORDER.map(name => {
        if (name === 'Diligence') return 0;
        return p.branches?.[name]?.baseline || 0;
      });

      let html = '';

      // ─ Defs ─
      html += `
        <defs>
          <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
            <feMerge>
              <feMergeNode in="blur"/>
              <feMergeNode in="SourceGraphic"/>
            </feMerge>
          </filter>
          <radialGradient id="user-gradient" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="${archetypeColor}" stop-opacity="0.35"/>
            <stop offset="100%" stop-color="${archetypeColor}" stop-opacity="0.08"/>
          </radialGradient>
        </defs>
      `;

      // ─ Grid: 3 concentric diamonds ─
      html += '<g class="grid-layer">';
      [0.33, 0.66, 1.0].forEach(pct => {
        const pts = quadPoints([pct, pct, pct, pct]);
        html += `<polygon points="${pts}" fill="none" stroke="rgba(160,128,64,0.10)" stroke-width="1"/>`;
      });

      // ─ Spokes ─
      AXIS_ANGLES.forEach((angle, i) => {
        const p2 = polarToCartesian(CX, CY, R, angle);
        const isDiligence = AXES_ORDER[i] === 'Diligence';
        html += `<line x1="${CX}" y1="${CY}" x2="${p2.x}" y2="${p2.y}"
          stroke="${isDiligence ? 'rgba(155,142,196,0.08)' : 'rgba(160,128,64,0.08)'}"
          stroke-width="1" stroke-dasharray="${isDiligence ? '2 4' : '3 5'}"/>`;
      });
      html += '</g>';

      // ─ Baseline polygon (only 3 real axes, skip Diligence) ─
      const baselinePts = quadPoints(baselines);
      html += `<polygon points="${baselinePts}" fill="none" stroke="rgba(232,228,223,0.12)" stroke-width="1.5" stroke-dasharray="4 3"/>`;

      // ─ User polygon ─
      const zeroPts = quadPoints([0, 0, 0, 0]);
      html += `<polygon id="user-poly" points="${zeroPts}" fill="url(#user-gradient)" stroke="${archetypeColor}" stroke-width="2" filter="url(#glow)"/>`;

      // ─ Vertex dots ─
      AXES_ORDER.forEach((name, i) => {
        const isDiligence = name === 'Diligence';
        html += `<circle id="vertex-${i}" cx="${CX}" cy="${CY}" r="${isDiligence ? 3 : 4}"
          fill="${AXIS_COLORS[name]}" opacity="${isDiligence ? 0.3 : 0.8}"
          ${isDiligence ? 'stroke="' + AXIS_COLORS[name] + '" stroke-width="1" stroke-dasharray="2 2" fill-opacity="0.15"' : ''}/>`;
      });

      // ─ Labels ─
      AXES_ORDER.forEach((name, i) => {
        const angle = AXIS_ANGLES[i];
        const labelR = R + 30;
        const pt = polarToCartesian(CX, CY, labelR, angle);
        const isDiligence = name === 'Diligence';
        const pctText = isDiligence ? '\u2014' : Math.round(scores[i] * 100) + '%';
        const color = AXIS_COLORS[name];

        // Anchoring based on position
        let anchor = 'middle';
        let dx = 0;
        if (angle === 90) { anchor = 'start'; dx = 4; }
        if (angle === 270) { anchor = 'end'; dx = -4; }

        const fourDLabel = AXIS_4D[name];

        if (angle === 0) {
          // Top
          html += `<text x="${pt.x}" y="${pt.y - 10}" text-anchor="middle" font-family="'Outfit', sans-serif" font-size="12" fill="#e8e4df" font-weight="500">${pctText}</text>`;
          html += `<text x="${pt.x}" y="${pt.y + 4}" text-anchor="middle" font-family="'Cormorant Garamond', serif" font-size="13" fill="${color}" font-weight="600">${name}</text>`;
          html += `<text x="${pt.x}" y="${pt.y + 16}" text-anchor="middle" font-family="'Outfit', sans-serif" font-size="8" fill="#4a4540" letter-spacing="0.08em">${fourDLabel}</text>`;
        } else if (angle === 180) {
          // Bottom
          html += `<text x="${pt.x}" y="${pt.y + 2}" text-anchor="middle" font-family="'Cormorant Garamond', serif" font-size="13" fill="${color}" font-weight="600" ${isDiligence ? 'opacity="0.5"' : ''}>${name}</text>`;
          html += `<text x="${pt.x}" y="${pt.y + 16}" text-anchor="middle" font-family="'Outfit', sans-serif" font-size="11" fill="${isDiligence ? '#4a4540' : '#e8e4df'}" font-weight="${isDiligence ? 300 : 500}">${pctText}</text>`;
          if (isDiligence) {
            html += `<text x="${pt.x}" y="${pt.y + 29}" text-anchor="middle" font-family="'Outfit', sans-serif" font-size="8.5" fill="#4a4540" font-weight="300">not observable in-chat</text>`;
          }
        } else {
          // Left / Right
          html += `<text x="${pt.x + dx}" y="${pt.y - 6}" text-anchor="${anchor}" font-family="'Cormorant Garamond', serif" font-size="13" fill="${color}" font-weight="600">${name}</text>`;
          html += `<text x="${pt.x + dx}" y="${pt.y + 8}" text-anchor="${anchor}" font-family="'Outfit', sans-serif" font-size="12" fill="#e8e4df" font-weight="500">${pctText}</text>`;
          html += `<text x="${pt.x + dx}" y="${pt.y + 20}" text-anchor="${anchor}" font-family="'Outfit', sans-serif" font-size="8" fill="#4a4540" letter-spacing="0.08em">${fourDLabel}</text>`;
        }
      });

      // ─ Hover/click sectors (invisible 90-degree wedges) ─
      html += '<g class="sectors-layer">';
      AXES_ORDER.forEach((name, i) => {
        const startA = AXIS_ANGLES[i] - 45;
        const endA = AXIS_ANGLES[i] + 45;
        const d = sectorPath(startA, endA);
        html += `<path class="sector-hit" data-axis="${name}" data-index="${i}" d="${d}"/>`;
      });
      html += '</g>';

      svg.innerHTML = html;

      // ─ Animate polygon ─
      const userPoly = document.getElementById('user-poly');
      const fromVals = [0, 0, 0, 0];
      const toVals = scores.map(v => Math.max(v, MIN_DISPLAY));

      const animStart = performance.now();
      const duration = 900;
      function tick(now) {
        const t = Math.min((now - animStart) / duration, 1);
        const eased = 1 - Math.pow(1 - t, 3);
        const current = fromVals.map((f, i) => f + (toVals[i] - f) * eased);
        userPoly.setAttribute('points', quadPoints(current));

        current.forEach((v, i) => {
          const pt = polarToCartesian(CX, CY, R * v, AXIS_ANGLES[i]);
          const dot = document.getElementById(`vertex-${i}`);
          dot.setAttribute('cx', pt.x);
          dot.setAttribute('cy', pt.y);
        });

        if (t < 1) requestAnimationFrame(tick);
      }
      requestAnimationFrame(() => requestAnimationFrame(tick));

      // ─ Interaction: click-to-select, hover-to-preview ─
      const drilldown = document.getElementById('drilldown');

      document.querySelectorAll('.sector-hit').forEach(sector => {
        // Hover: preview drilldown (unless that axis is already selected)
        sector.addEventListener('mouseenter', () => {
          const axisName = sector.dataset.axis;
          hoveredAxis = axisName;
          if (selectedAxis !== axisName) {
            showDrilldown(axisName, p, true); // preview mode
          }
        });

        sector.addEventListener('mouseleave', () => {
          hoveredAxis = null;
          // Revert to selected axis, or hide
          if (selectedAxis) {
            showDrilldown(selectedAxis, p, false);
          } else {
            drilldown.classList.remove('visible');
            drilldown.classList.remove('preview');
          }
        });

        // Click: lock selection
        sector.addEventListener('click', () => {
          const axisName = sector.dataset.axis;
          if (selectedAxis === axisName) {
            // Deselect
            selectedAxis = null;
            document.querySelectorAll('.sector-hit').forEach(s => s.classList.remove('selected'));
            drilldown.classList.remove('visible');
            drilldown.classList.remove('preview');
          } else {
            selectedAxis = axisName;
            document.querySelectorAll('.sector-hit').forEach(s => s.classList.remove('selected'));
            sector.classList.add('selected');
            showDrilldown(axisName, p, false);
          }
        });
      });
    }

    function showDrilldown(axisName, p, isPreview) {
      const drilldown = document.getElementById('drilldown');
      const color = AXIS_COLORS[axisName];
      const isDiligence = axisName === 'Diligence';

      let html = `
        <div class="drilldown-header">
          <div class="drilldown-dot" style="background:${color}"></div>
          <div class="drilldown-name">${axisName}</div>
          <span class="drilldown-desc">\u2014 ${AXIS_DESCS[axisName] || ''}</span>
          ${!isPreview && selectedAxis === axisName ? '<span class="drilldown-locked">\u25C6 selected</span>' : ''}
        </div>
      `;

      if (isDiligence) {
        const diligenceBehaviors = [
          { label: 'Creation Diligence', def: 'Being thoughtful about which AI systems you use and how you interact with them', question: 'Are you choosing the right tools for the sensitivity of your work?' },
          { label: 'Transparency Diligence', def: 'Being honest about AI\u2019s role in your work with everyone who needs to know', question: 'Would your stakeholders know how AI contributed?' },
          { label: 'Deployment Diligence', def: 'Taking responsibility for verifying and vouching for the outputs you use or share', question: 'Have you verified this before putting your name on it?' },
        ];

        diligenceBehaviors.forEach(db => {
          html += `<div style="margin-bottom:0.75rem">
            <div style="font-size:0.75rem; color:${color}; font-weight:500; margin-bottom:0.15rem">${db.label}</div>
            <div style="font-size:0.7rem; color:#8a8580; line-height:1.4; margin-bottom:0.2rem">${db.def}</div>
            <div style="font-size:0.65rem; color:#4a4540; font-style:italic">\u25B8 ${db.question}</div>
          </div>`;
        });

        html += `<div class="diligence-note" style="margin-top:0.5rem">
          These behaviors happen outside the conversation and cannot be measured from chat data.
          <span style="display:block; margin-top:0.3rem; color:#4a4540">Source: <a href="https://aifluencyframework.org" style="color:#9b8ec4; text-decoration:none" target="_blank">Dakan &amp; Feller, AI Fluency Framework</a></span>
        </div>`;
      } else {
        const branch = p.branches?.[axisName];
        if (branch) {
          (branch.behaviors || []).forEach(key => {
            const b = p.behaviors[key];
            if (!b) return;
            const pct = Math.round(b.rate * 100);
            const bl = Math.round(b.baseline * 100);
            const c = pct > bl ? 'above' : pct < bl ? 'below' : 'at';
            const arrow = pct > bl ? '\u2191' : pct < bl ? '\u2193' : '=';

            html += `<div class="behavior-row">
              <div class="behavior-name">${b.label || key}</div>
              <div class="bar-track">
                <div class="bar-fill" style="background:${color}; width:${pct}%"></div>
                <div class="bar-baseline" style="left:${bl}%"></div>
              </div>
              <div class="behavior-pct">${pct}%</div>
              <div class="behavior-cmp ${c}">${arrow}</div>
            </div>`;
          });
        }
      }

      drilldown.innerHTML = html;
      drilldown.classList.add('visible');
      if (isPreview) {
        drilldown.classList.add('preview');
      } else {
        drilldown.classList.remove('preview');
      }
    }

    // ── Gateway bar ──────────────────────────────────────────────────
    function renderGateway(p) {
      const el = document.getElementById('gateway');
      const iterPct = Math.round((p.behaviors?.iterative_improvement?.rate || 0) * 100);
      el.innerHTML = `
        <div class="gateway-label">Iteration</div>
        <div class="gateway-bar"><div class="gateway-fill" data-width="${iterPct}"></div></div>
        <div class="gateway-pct">${iterPct}%</div>
      `;
      requestAnimationFrame(() => requestAnimationFrame(() => {
        el.querySelector('.gateway-fill').style.width = iterPct + '%';
      }));
    }

    // ── Quest ────────────────────────────────────────────────────────
    function renderQuest(p) {
      const el = document.getElementById('growth-quest');
      const a = p.archetype || {};
      const ge = p.growth_edge || {};
      el.innerHTML = `
        <div class="quest-label">\u25C6 Next Unlock</div>
        <div class="quest-title">${a.growth_unlock || ''}</div>
        <div class="quest-text">${a.growth_quest || ''}</div>
        <div class="quest-edge">
          <strong>Growth edge:</strong> ${ge.label || ''} \u2014
          ${Math.round((ge.rate||0)*100)}% vs ${Math.round((ge.baseline||0)*100)}% avg
        </div>
      `;
    }

    // ── Init ─────────────────────────────────────────────────────────
    if (PROFILE?.behaviors) {
      renderCard(PROFILE);
      renderRadar(PROFILE);
      renderGateway(PROFILE);
      renderQuest(PROFILE);
    }
  </script>
</body>
</html>
