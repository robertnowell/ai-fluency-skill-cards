<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skill Tree — Constellation Radar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Outfit', sans-serif;
      font-weight: 300;
      background: #0a0908;
      color: #e8e4df;
      min-height: 100vh;
    }

    .page {
      max-width: 620px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem 4rem;
    }

    .mark {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.7rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(160,128,64,0.4);
      text-align: center;
      margin-bottom: 2rem;
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    /* ══════════════════════════════════════════
       TAROT CARD
       ══════════════════════════════════════════ */

    .card {
      --ap: #9e9589; --aa: #d4cec6;
      max-width: 380px;
      margin: 0 auto 2rem;
      aspect-ratio: 7 / 12;
      border-radius: 12px;
      border: 3px solid #2a2520;
      overflow: hidden;
      position: relative;
      background: #0e0d0b;
      opacity: 0;
      transform: translateY(12px);
      animation: fadeUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) 0.1s forwards;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6);
    }

    .card[data-archetype="catalyst"]    { --ap: #d4584a; --aa: #e8a090; }
    .card[data-archetype="compass"]     { --ap: #4a7ba3; --aa: #a3c4db; }
    .card[data-archetype="forgemaster"] { --ap: #b8860b; --aa: #e8d4a8; }
    .card[data-archetype="illuminator"] { --ap: #3d8a5a; --aa: #a8d4b8; }
    .card[data-archetype="architect"]   { --ap: #6a8094; --aa: #b0c0d0; }
    .card[data-archetype="conductor"]   { --ap: #8b3a62; --aa: #d4a0b8; }
    .card[data-archetype="polymath"]    { --ap: #a08040; --aa: #e8d8b0; }

    .card::before {
      content: '';
      position: absolute; inset: 6px; z-index: 1;
      border: 1px solid rgba(160,128,64,0.25);
      border-radius: 8px;
      pointer-events: none;
    }
    .card::after {
      content: '';
      position: absolute; inset: 10px; z-index: 1;
      border: 1px solid rgba(160,128,64,0.12);
      border-radius: 6px;
      pointer-events: none;
    }

    .corner {
      position: absolute; width: 20px; height: 20px; z-index: 2;
      border-color: rgba(160,128,64,0.3); border-style: solid; border-width: 0;
    }
    .corner.tl { top: 12px; left: 12px; border-top-width: 1px; border-left-width: 1px; }
    .corner.tr { top: 12px; right: 12px; border-top-width: 1px; border-right-width: 1px; }
    .corner.bl { bottom: 12px; left: 12px; border-bottom-width: 1px; border-left-width: 1px; }
    .corner.br { bottom: 12px; right: 12px; border-bottom-width: 1px; border-right-width: 1px; }

    .card-art { position: absolute; inset: 0; z-index: 0; }
    .card-art img {
      width: 100%; height: 100%; object-fit: cover; display: block;
      mask-image: linear-gradient(to bottom, transparent 0%, black 12%, black 65%, transparent 100%);
      -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 12%, black 65%, transparent 100%);
    }

    .card-top {
      position: relative; z-index: 2; text-align: center;
      padding: 1.2rem 1.5rem 0.5rem;
      background: linear-gradient(180deg, rgba(14,13,11,0.9) 0%, transparent 100%);
    }
    .card-numeral {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.6rem; color: rgba(160,128,64,0.5); letter-spacing: 0.4em;
    }
    .card-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.8rem; font-weight: 600; color: #e8d8b0;
      letter-spacing: 0.04em; text-shadow: 0 2px 12px rgba(0,0,0,0.8); line-height: 1.1;
    }

    .card-bottom {
      position: absolute; bottom: 0; left: 0; right: 0; z-index: 2;
      text-align: center; padding: 3rem 1.5rem 1.2rem;
      background: linear-gradient(to top, rgba(14,13,11,0.95) 0%, rgba(14,13,11,0.75) 40%, transparent 100%);
    }
    .card-tagline {
      font-family: 'Cormorant Garamond', serif; font-style: italic;
      font-size: 0.9rem; color: rgba(200,190,175,0.85); line-height: 1.4; margin-bottom: 0.6rem;
    }
    .card-divider { width: 40px; height: 1px; background: rgba(160,128,64,0.3); margin: 0.5rem auto; }
    .card-axes { display: flex; justify-content: center; gap: 1.5rem; margin-bottom: 0.5rem; }
    .card-ax {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.7rem; color: rgba(160,128,64,0.6); letter-spacing: 0.05em;
    }
    .card-power {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.65rem; color: rgba(232,216,176,0.45); font-style: italic; line-height: 1.4;
    }

    /* ══════════════════════════════════════════
       CONSTELLATION RADAR
       ══════════════════════════════════════════ */

    .radar-section {
      background: #1a1918;
      border: 1px solid #2a2826;
      border-radius: 1rem;
      overflow: visible;
      margin-bottom: 1.5rem;
      opacity: 0;
      transform: translateY(12px);
      animation: fadeUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) 0.3s forwards;
    }

    .radar-header {
      padding: 1.5rem 2rem 0.5rem;
      border-bottom: 1px solid #2a2826;
    }
    .radar-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.3rem; font-weight: 600; color: #e8e4df;
    }
    .radar-sub { font-size: 0.7rem; color: #4a4540; margin-top: 0.25rem; }

    .gateway {
      padding: 0.8rem 2rem;
      border-bottom: 1px solid #2a2826;
      display: flex; align-items: center; gap: 0.75rem;
    }
    .gateway-label { font-size: 0.7rem; color: #6b6560; font-weight: 500; white-space: nowrap; }
    .gateway-bar { flex: 1; height: 4px; background: #2a2826; border-radius: 2px; overflow: hidden; }
    .gateway-fill { height: 100%; background: #4a4540; border-radius: 2px; width: 0%; transition: width 1s cubic-bezier(0.22,1,0.36,1); }
    .gateway-pct { font-size: 0.7rem; color: #4a4540; font-variant-numeric: tabular-nums; }

    .radar-body {
      padding: 1rem 0.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
    }

    .constellation-svg {
      width: 100%;
      max-width: 520px;
      height: auto;
    }

    /* Spoke hover hit area */
    .spoke-hit {
      stroke: transparent;
      stroke-width: 24;
      fill: none;
      cursor: pointer;
    }
    .spoke-hit:hover + .spoke-visible {
      stroke-opacity: 0.3;
    }

    /* ── Tooltip ── */
    .tooltip {
      position: fixed;
      background: #1a1918;
      border: 1px solid #2a2826;
      border-radius: 0.6rem;
      padding: 0.75rem 1rem;
      max-width: 260px;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      z-index: 100;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    }
    .tooltip.visible {
      opacity: 1;
      transform: translateY(0);
    }
    .tt-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.9rem; font-weight: 600; color: #e8e4df; margin-bottom: 0.15rem;
    }
    .tt-axis {
      font-size: 0.6rem; color: #4a4540; margin-bottom: 0.4rem; text-transform: uppercase; letter-spacing: 0.1em;
    }
    .tt-bar-track {
      height: 4px; background: #2a2826; border-radius: 2px; margin-bottom: 0.3rem; position: relative;
    }
    .tt-bar-fill { height: 100%; border-radius: 2px; }
    .tt-bar-baseline {
      position: absolute; top: -2px; height: 8px; width: 2px; background: #e8e4df; opacity: 0.15; border-radius: 1px;
    }
    .tt-stats {
      font-size: 0.7rem; color: #8a8580; display: flex; justify-content: space-between;
    }
    .tt-dir { font-weight: 500; }
    .tt-dir.above { color: #5a9e6f; }
    .tt-dir.below { color: #c4836e; }
    .tt-evidence {
      font-size: 0.6rem; color: #6b6560; font-style: italic; line-height: 1.4;
      border-top: 1px solid #2a2826; padding-top: 0.4rem; margin-top: 0.4rem;
    }

    /* ── Axis legend ── */
    .axis-legend {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      padding: 0.75rem 2rem 1rem;
      border-top: 1px solid #2a2826;
    }
    .legend-item {
      display: flex; align-items: center; gap: 0.4rem;
      font-size: 0.65rem; color: #6b6560;
    }
    .legend-dot { width: 6px; height: 6px; border-radius: 50%; }

    /* ── Growth Quest ── */
    .quest {
      background: #1a1918;
      border: 1px solid #2a2826;
      border-radius: 1rem;
      padding: 1.5rem 2rem;
      margin-bottom: 1.5rem;
      opacity: 0;
      transform: translateY(12px);
      animation: fadeUp 0.6s cubic-bezier(0.22,1,0.36,1) 0.5s forwards;
    }
    .quest-label {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.6rem; font-weight: 600; letter-spacing: 0.2em; text-transform: uppercase;
      color: rgba(160,128,64,0.6); margin-bottom: 0.5rem;
    }
    .quest-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem; font-weight: 600; color: #e8e4df; margin-bottom: 0.4rem;
    }
    .quest-text { font-size: 0.8rem; color: #8a8580; line-height: 1.5; }
    .quest-edge {
      margin-top: 0.75rem; padding-top: 0.75rem; border-top: 1px solid #2a2826;
      font-size: 0.7rem; color: #6b6560;
    }
    .quest-edge strong { color: #8a8580; font-weight: 500; }

    .footer {
      text-align: center; margin-top: 1rem;
      opacity: 0; animation: fadeUp 0.6s cubic-bezier(0.22,1,0.36,1) 0.7s forwards;
    }
    .footer-text { font-size: 0.6rem; color: #3a3835; }
    .footer-text a { color: #4a4540; text-decoration: none; }
    .footer-text a:hover { color: #6b6560; }

    @media (max-width: 480px) {
      .page { padding: 1.5rem 1rem 3rem; }
      .card { max-width: 100%; }
      .card-name { font-size: 1.5rem; }
      .axis-legend { gap: 1rem; flex-wrap: wrap; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="mark">Skill Tree &middot; AI Fluency</div>

    <div class="card" id="character-card"></div>

    <div class="radar-section" id="radar-section">
      <div class="radar-header">
        <div class="radar-title">Skill Constellation</div>
        <div class="radar-sub">10 behaviors &middot; 3 axes &middot; hover for details</div>
      </div>
      <div class="gateway" id="gateway"></div>
      <div class="radar-body">
        <svg class="constellation-svg" viewBox="0 0 520 520" id="constellation-svg"></svg>
      </div>
      <div class="axis-legend">
        <div class="legend-item"><div class="legend-dot" style="background:#cca67b"></div>Description</div>
        <div class="legend-item"><div class="legend-dot" style="background:#7bcc96"></div>Discernment</div>
        <div class="legend-item"><div class="legend-dot" style="background:#7ba3cc"></div>Delegation</div>
      </div>
    </div>

    <div class="quest" id="growth-quest"></div>

    <div class="footer">
      <div class="footer-text">
        <a href="https://www.anthropic.com/research/AI-fluency-index">Anthropic AI Fluency Index</a>
        &middot; <a href="https://aifluencyframework.org/">Dakan &amp; Feller</a>
        &middot; <a href="https://github.com/robertnowell">Robert Nowell</a>
      </div>
    </div>
  </div>

  <!-- Floating tooltip (outside .page for position:fixed) -->
  <div class="tooltip" id="tooltip"></div>

  <script>
    const PROFILE = __PROFILE_DATA__;
    const ARCHETYPES = __ARCHETYPES_DATA__;
    const NUMERALS = { catalyst:'I', compass:'II', forgemaster:'III', conductor:'IV', illuminator:'V', architect:'VI', polymath:'VII' };

    // Behavior order: grouped by axis, adjacently around the circle
    const BEHAVIOR_ORDER = [
      // Description (4 behaviors)
      'show_examples', 'specify_format', 'express_tone_style', 'define_audience',
      // Discernment (3 behaviors)
      'identify_context_gaps', 'question_reasoning', 'verify_facts',
      // Delegation (3 behaviors)
      'clarify_goals', 'consult_approach', 'set_interactive_mode'
    ];

    const BEHAVIOR_AXIS = {
      show_examples: 'Description', specify_format: 'Description',
      express_tone_style: 'Description', define_audience: 'Description',
      identify_context_gaps: 'Discernment', question_reasoning: 'Discernment', verify_facts: 'Discernment',
      clarify_goals: 'Delegation', consult_approach: 'Delegation', set_interactive_mode: 'Delegation',
    };

    const AXIS_COLORS = { Description: '#cca67b', Discernment: '#7bcc96', Delegation: '#7ba3cc' };

    // ── Math ─────────────────────────────────────────────────────────
    const N = 10;
    const CX = 260, CY = 260, R = 170;
    const MIN_DISPLAY = 0.08;
    const STEP = 360 / N; // 36 degrees

    function polarToCartesian(cx, cy, radius, angleDeg) {
      const rad = (angleDeg - 90) * Math.PI / 180;
      return { x: cx + radius * Math.cos(rad), y: cy + radius * Math.sin(rad) };
    }

    function polyPoints(values) {
      return values.map((v, i) => {
        const p = polarToCartesian(CX, CY, R * Math.max(v, MIN_DISPLAY), STEP * i);
        return `${p.x},${p.y}`;
      }).join(' ');
    }

    function decagonPoints(pct) {
      return Array.from({length: N}, (_, i) => {
        const p = polarToCartesian(CX, CY, R * pct, STEP * i);
        return `${p.x},${p.y}`;
      }).join(' ');
    }

    function sectorPath(startIdx, count) {
      const halfStep = STEP / 2;
      const startAngle = STEP * startIdx - halfStep;
      const endAngle = STEP * (startIdx + count - 1) + halfStep;
      const p1 = polarToCartesian(CX, CY, R + 8, startAngle);
      const p2 = polarToCartesian(CX, CY, R + 8, endAngle);
      const sweep = endAngle - startAngle;
      const large = sweep > 180 ? 1 : 0;
      return `M${CX},${CY} L${p1.x},${p1.y} A${R + 8},${R + 8} 0 ${large} 1 ${p2.x},${p2.y} Z`;
    }

    function labelAnchor(angleDeg) {
      const a = ((angleDeg % 360) + 360) % 360;
      if (a > 20 && a < 160) return 'start';
      if (a > 200 && a < 340) return 'end';
      return 'middle';
    }

    function labelDy(angleDeg) {
      const a = ((angleDeg % 360) + 360) % 360;
      if (a > 150 && a < 210) return 16; // bottom — push down
      if (a < 30 || a > 330) return -6;  // top — push up
      return 4;
    }

    // ── Render card ──────────────────────────────────────────────────
    function renderCard(p) {
      const a = p.archetype || {};
      const el = document.getElementById('character-card');
      const key = a.key || 'catalyst';
      el.setAttribute('data-archetype', key);

      const url = a.hero_art?.url || '';
      const pos = a.hero_art?.position || 'center center';
      const descPct = Math.round((a.axis_scores?.description || 0) * 100);
      const discPct = Math.round((a.axis_scores?.discernment || 0) * 100);
      const delegPct = Math.round((a.axis_scores?.delegation || 0) * 100);

      el.innerHTML = `
        <div class="corner tl"></div><div class="corner tr"></div>
        <div class="corner bl"></div><div class="corner br"></div>
        <div class="card-art">${url ? `<img src="${url}" alt="" style="object-position:${pos}">` : ''}</div>
        <div class="card-top">
          <div class="card-numeral">${NUMERALS[key] || ''}</div>
          <div class="card-name">${a.name || 'Unknown'}</div>
        </div>
        <div class="card-bottom">
          <div class="card-tagline">${a.tagline || ''}</div>
          <div class="card-divider"></div>
          <div class="card-axes">
            <div class="card-ax">Desc ${descPct}%</div>
            <div class="card-ax">Disc ${discPct}%</div>
            <div class="card-ax">Delegation ${delegPct}%</div>
          </div>
          <div class="card-divider"></div>
          <div class="card-power">${a.superpower || ''}</div>
        </div>
      `;
    }

    // ── Render constellation radar ───────────────────────────────────
    function renderConstellation(p) {
      const svg = document.getElementById('constellation-svg');
      const archetypeColor = p.archetype?.color || '#a08040';

      const values = BEHAVIOR_ORDER.map(k => p.behaviors?.[k]?.rate || 0);
      const baselines = BEHAVIOR_ORDER.map(k => p.behaviors?.[k]?.baseline || 0);

      let html = '';

      // ─ Defs ─
      html += `
        <defs>
          <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
            <feMerge>
              <feMergeNode in="blur"/>
              <feMergeNode in="SourceGraphic"/>
            </feMerge>
          </filter>
          <radialGradient id="user-gradient" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="${archetypeColor}" stop-opacity="0.30"/>
            <stop offset="100%" stop-color="${archetypeColor}" stop-opacity="0.08"/>
          </radialGradient>
        </defs>
      `;

      // ─ Sector backgrounds ─
      html += '<g class="sector-bg-layer">';
      html += `<path d="${sectorPath(0, 4)}" fill="rgba(204,166,123,0.03)"/>`;  // Spec
      html += `<path d="${sectorPath(4, 3)}" fill="rgba(123,204,150,0.03)"/>`;  // Eval
      html += `<path d="${sectorPath(7, 3)}" fill="rgba(123,163,204,0.03)"/>`;  // Delegation
      html += '</g>';

      // ─ Concentric decagon grid ─
      html += '<g class="grid-layer">';
      [0.33, 0.66, 1.0].forEach(pct => {
        html += `<polygon points="${decagonPoints(pct)}" fill="none" stroke="rgba(160,128,64,0.08)" stroke-width="1"/>`;
      });

      // ─ Spokes ─
      for (let i = 0; i < N; i++) {
        const pt = polarToCartesian(CX, CY, R, STEP * i);
        const color = AXIS_COLORS[BEHAVIOR_AXIS[BEHAVIOR_ORDER[i]]];
        html += `<line x1="${CX}" y1="${CY}" x2="${pt.x}" y2="${pt.y}" stroke="${color}" stroke-opacity="0.12" stroke-width="1"/>`;
      }
      html += '</g>';

      // ─ Baseline polygon ─
      html += `<polygon points="${polyPoints(baselines)}" fill="none" stroke="rgba(232,228,223,0.10)" stroke-width="1.5" stroke-dasharray="4 3"/>`;

      // ─ User polygon ─
      const zeroPts = polyPoints(new Array(N).fill(0));
      html += `<polygon id="user-poly" points="${zeroPts}" fill="url(#user-gradient)" stroke="${archetypeColor}" stroke-width="1.5" filter="url(#glow)"/>`;

      // ─ Vertex dots ─
      for (let i = 0; i < N; i++) {
        const color = AXIS_COLORS[BEHAVIOR_AXIS[BEHAVIOR_ORDER[i]]];
        html += `<circle id="vdot-${i}" cx="${CX}" cy="${CY}" r="3.5" fill="${color}" opacity="0"/>`;
      }

      // ─ Labels ─
      for (let i = 0; i < N; i++) {
        const angle = STEP * i;
        const labelR = R + 20;
        const pt = polarToCartesian(CX, CY, labelR, angle);
        const anchor = labelAnchor(angle);
        const dy = labelDy(angle);
        const b = p.behaviors?.[BEHAVIOR_ORDER[i]];
        const label = b?.label || BEHAVIOR_ORDER[i];
        const color = AXIS_COLORS[BEHAVIOR_AXIS[BEHAVIOR_ORDER[i]]];

        html += `<text x="${pt.x}" y="${pt.y + dy}" text-anchor="${anchor}" font-family="'Outfit', sans-serif" font-size="9.5" fill="${color}" fill-opacity="0.6" font-weight="400">${label}</text>`;
      }

      // ─ Hover hit areas (wide invisible spokes) ─
      html += '<g class="hit-layer">';
      for (let i = 0; i < N; i++) {
        const pt = polarToCartesian(CX, CY, R + 15, STEP * i);
        html += `<line class="spoke-hit" data-index="${i}" x1="${CX}" y1="${CY}" x2="${pt.x}" y2="${pt.y}"/>`;
      }
      html += '</g>';

      svg.innerHTML = html;

      // ─ Animate polygon ─
      const userPoly = document.getElementById('user-poly');
      const fromVals = new Array(N).fill(0);
      const toVals = values.map(v => Math.max(v, MIN_DISPLAY));

      const start = performance.now();
      const duration = 1000;
      function tick(now) {
        const t = Math.min((now - start) / duration, 1);
        const eased = 1 - Math.pow(1 - t, 3);
        const current = fromVals.map((f, i) => f + (toVals[i] - f) * eased);
        userPoly.setAttribute('points', polyPoints(current));

        // Animate vertex dots
        current.forEach((v, i) => {
          const pt = polarToCartesian(CX, CY, R * v, STEP * i);
          const dot = document.getElementById(`vdot-${i}`);
          dot.setAttribute('cx', pt.x);
          dot.setAttribute('cy', pt.y);
          // Staggered fade-in
          if (t > (i * 0.06)) {
            dot.setAttribute('opacity', Math.min((t - i * 0.06) / 0.15, 0.85));
          }
        });

        if (t < 1) requestAnimationFrame(tick);
      }
      requestAnimationFrame(() => requestAnimationFrame(tick));

      // ─ Hover tooltip ─
      const tooltip = document.getElementById('tooltip');
      const svgEl = svg;

      document.querySelectorAll('.spoke-hit').forEach(hit => {
        hit.addEventListener('mouseenter', (e) => {
          const idx = parseInt(e.target.dataset.index);
          const key = BEHAVIOR_ORDER[idx];
          const b = p.behaviors?.[key];
          if (!b) return;

          const axis = BEHAVIOR_AXIS[key];
          const color = AXIS_COLORS[axis];
          const pct = Math.round(b.rate * 100);
          const bl = Math.round(b.baseline * 100);
          const isAbove = b.above_baseline;
          const dirText = isAbove ? `\u2191 ${pct - bl}pp above avg` : `\u2193 ${bl - pct}pp below avg`;
          const dirClass = isAbove ? 'above' : 'below';

          let evidenceHtml = '';
          if (b.evidence?.[0]?.text) {
            const txt = b.evidence[0].text.length > 120 ? b.evidence[0].text.slice(0, 120) + '...' : b.evidence[0].text;
            evidenceHtml = `<div class="tt-evidence">"${txt}"</div>`;
          }

          tooltip.innerHTML = `
            <div class="tt-name" style="color:${color}">${b.label}</div>
            <div class="tt-axis">${axis}</div>
            <div class="tt-bar-track">
              <div class="tt-bar-fill" style="background:${color}; width:${pct}%; border-radius:2px;"></div>
              <div class="tt-bar-baseline" style="left:${bl}%"></div>
            </div>
            <div class="tt-stats">
              <span>${pct}%</span>
              <span class="tt-dir ${dirClass}">${dirText}</span>
            </div>
            ${evidenceHtml}
          `;

          // Position near the spoke endpoint
          const angle = STEP * idx;
          const spokeEnd = polarToCartesian(CX, CY, R * 0.7, angle);

          const svgRect = svgEl.getBoundingClientRect();
          const scaleX = svgRect.width / 520;
          const scaleY = svgRect.height / 520;

          let left = svgRect.left + spokeEnd.x * scaleX;
          let top = svgRect.top + spokeEnd.y * scaleY;

          // Keep tooltip in viewport
          const ttWidth = 260;
          if (left + ttWidth > window.innerWidth - 16) left = window.innerWidth - ttWidth - 16;
          if (left < 16) left = 16;
          if (top + 120 > window.innerHeight) top -= 130;

          tooltip.style.left = left + 'px';
          tooltip.style.top = top + 'px';
          tooltip.classList.add('visible');

          // Highlight the spoke dot
          const dot = document.getElementById(`vdot-${idx}`);
          dot.setAttribute('r', '5.5');
          dot.setAttribute('opacity', '1');
        });

        hit.addEventListener('mouseleave', (e) => {
          const idx = parseInt(e.target.dataset.index);
          tooltip.classList.remove('visible');

          const dot = document.getElementById(`vdot-${idx}`);
          dot.setAttribute('r', '3.5');
          dot.setAttribute('opacity', '0.85');
        });
      });
    }

    // ── Render gateway ───────────────────────────────────────────────
    function renderGateway(p) {
      const el = document.getElementById('gateway');
      const iterPct = Math.round((p.behaviors?.iterative_improvement?.rate || 0) * 100);
      el.innerHTML = `
        <div class="gateway-label">Iteration</div>
        <div class="gateway-bar"><div class="gateway-fill" data-width="${iterPct}"></div></div>
        <div class="gateway-pct">${iterPct}%</div>
      `;
      requestAnimationFrame(() => requestAnimationFrame(() => {
        el.querySelector('.gateway-fill').style.width = iterPct + '%';
      }));
    }

    // ── Render quest ─────────────────────────────────────────────────
    function renderQuest(p) {
      const el = document.getElementById('growth-quest');
      const a = p.archetype || {};
      const ge = p.growth_edge || {};
      el.innerHTML = `
        <div class="quest-label">\u25C6 Next Unlock</div>
        <div class="quest-title">${a.growth_unlock || ''}</div>
        <div class="quest-text">${a.growth_quest || ''}</div>
        <div class="quest-edge">
          <strong>Growth edge:</strong> ${ge.label || ''} \u2014
          ${Math.round((ge.rate||0)*100)}% vs ${Math.round((ge.baseline||0)*100)}% avg
        </div>
      `;
    }

    // ── Init ─────────────────────────────────────────────────────────
    if (PROFILE?.behaviors) {
      renderCard(PROFILE);
      renderConstellation(PROFILE);
      renderGateway(PROFILE);
      renderQuest(PROFILE);
    }
  </script>
</body>
</html>
